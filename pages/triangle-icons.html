<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triangle Icon Set</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
      gap: 0;
    }

    /* ── Swatch rows ── */
    .swatch {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 32px 48px;
    }
    .swatch--dark  { background: #3a3a3a; --icon-bg: #3a3a3a; }
    .swatch--white { background: #ffffff; --icon-bg: #ffffff; }
    .swatch--blue  { background: #3c84c7; --icon-bg: #3c84c7; }

    /* ── Disease timeline context ── */
    .swatch--timeline {
      background: #f2f4f7;
      --icon-bg: #ffffff;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 32px 0;
    }

    /* ─────────────────────────────────────────
       ICON-WRAP: base rules (desktop + mobile
       both build on these)
    ───────────────────────────────────────── */
    .icon-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      --triangle-icon-size: 16px;
    }
    .icon-wrap svg {
      display: block;
      width: var(--triangle-icon-size);
      height: auto;
      overflow: visible;
    }
    .icon-wrap svg polygon {
      fill: #D4D4D4;
      stroke: var(--icon-bg, #3a3a3a);
      stroke-width: 1;
      stroke-linejoin: miter;
      vector-effect: non-scaling-stroke;
    }
    .icon-wrap svg polygon.thin {
      stroke-width: 1;
    }

    /* On blue, white fill so icons are visible */
    .swatch--blue .icon-wrap svg polygon {
      fill: #ffffff;
    }

    /* ─────────────────────────────────────────
       MOBILE: ≤768px
    ───────────────────────────────────────── */
    @media (max-width: 768px) {
      .icon-wrap {
        --triangle-icon-size: 14px;
      }
      .icon-wrap svg {
        width: 14px;
        height: 14px;
        max-width: 14px;
        max-height: 14px;
        object-fit: contain;
      }
      .icon-wrap svg polygon,
      .icon-wrap svg polygon.thin {
        stroke-width: 0.5;
      }
      /* Optional 44px touch target variant */
      .icon-wrap--touch {
        min-width: 44px;
        min-height: 44px;
      }
    }

    /* ─────────────────────────────────────────
       PHONE SHELL
    ───────────────────────────────────────── */
    .phone-frame {
      width: 375px;
      background: #ffffff;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.14), inset 0 0 0 1px rgba(0,0,0,0.08);
    }
    .phone-status {
      background: #f2f4f7;
      padding: 14px 20px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      font-weight: 600;
    }
    .page-header {
      background: #f2f4f7;
      padding: 4px 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      border-bottom: 1px solid #e0e3e8;
    }
    .page-title    { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    .page-subtitle { font-size: 13px; color: #3c84c7; font-weight: 500; }

    /* ─────────────────────────────────────────
       DISEASE CARD
    ───────────────────────────────────────── */
    .disease-card {
      background: #ffffff;
      margin: 12px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .disease-card__header {
      padding: 10px 14px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #f0f0f0;
    }
    .disease-card__title {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600; color: #1a1a1a;
    }

    /* Season + date strip */
    .season-row {
      padding: 8px 14px 6px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .season-label { font-size: 16px; font-weight: 700; }
    .season-picker {
      display: inline-flex; align-items: center; gap: 4px;
      background: #f0f0f0; border-radius: 20px; padding: 4px 10px;
      font-size: 13px; font-weight: 500;
    }
    .date-strip {
      display: flex; overflow-x: auto; scrollbar-width: none;
      padding: 0 14px 8px; gap: 4px;
    }
    .date-strip::-webkit-scrollbar { display: none; }
    .date-cell {
      flex-shrink: 0; width: 40px;
      display: flex; flex-direction: column; align-items: center;
      padding: 6px 4px; border-radius: 10px;
      font-size: 13px; font-weight: 600; color: #1a1a1a; gap: 1px;
    }
    .date-cell span { font-size: 10px; font-weight: 400; color: #888; }
    .date-cell--active { background: #3c84c7; color: #ffffff; }
    .date-cell--active span { color: rgba(255,255,255,0.8); }

    /* Timeline rows */
    .timeline-section { padding: 0 14px 8px; }
    .timeline-section__label { font-size: 11px; color: #888; padding: 6px 0 4px; }
    .timeline-row {
      display: flex; gap: 4px; padding: 2px 0; align-items: flex-end;
    }
    .tl-cell {
      flex-shrink: 0; width: 40px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end; gap: 3px;
    }

    /* Triangle icons inside timeline cells inherit mobile icon-wrap rules */
    .tl-cell .icon-wrap {
      --triangle-icon-size: 14px;
    }

    /* Status dots */
    .tl-dot { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; }
    .tl-dot--green  { background: #4caf50; }
    .tl-dot--yellow { background: #f5c518; }
    .tl-dot--red    { background: #e03a3a; }
    .tl-dot--grey   { background: #d0d0d0; }

    /* Action window */
    .action-window { margin: 4px 14px 8px; position: relative; }
    .action-window-bar {
      height: 3px; background: #7c5cbf; border-radius: 2px;
      margin-left: 164px; margin-right: 44px;
    }
    .action-window-label {
      font-size: 11px; font-weight: 600; color: #7c5cbf;
      text-align: center; margin-top: 2px;
    }

    /* Disease section */
    .disease-section { border-top: 1px solid #f0f0f0; }
    .disease-section__header {
      padding: 8px 14px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; font-weight: 500; color: #444;
    }
  </style>
</head>

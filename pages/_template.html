  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: var(--font-family); }

    /* Standard layout shell */
    .page-shell {
      display: flex;
      height: 100vh;
    }
    .page-shell__side {
      flex-shrink: 0;
      width: var(--nav-width);
      height: 100%;
      z-index: 10;
    }
    .page-shell__main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      height: 100%;
    }

    /* Page toolbar */
    .page-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-m);
      padding: var(--spacing-m) var(--spacing-l);
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface);
      flex-shrink: 0;
    }
    .page-toolbar__title {
      font-size: var(--font-size-18);
      font-weight: 600;
      color: var(--color-text);
      margin: 0;
      white-space: nowrap;
    }
    .page-toolbar__controls {
      display: flex;
      align-items: center;
      gap: var(--spacing-s);
      flex-wrap: wrap;
    }
    .page-toolbar__divider {
      width: 1px;
      height: 24px;
      background: var(--color-border);
      flex-shrink: 0;
    }
    .page-toolbar__collapse {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      padding: 0;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-surface);
      color: var(--color-text-muted);
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .page-toolbar__collapse:hover { background: var(--color-surface-muted); }
    .page-toolbar__collapse svg { width: 16px; height: 16px; }

    /* Neutral filter pill & button overrides */
    .filter-pill--neutral {
      --filter-pill-bg: var(--color-neutral-100);
      --filter-pill-bg-hover: var(--color-neutral-200);
      --filter-pill-bg-active: var(--color-neutral-500);
      --filter-pill-text: var(--color-neutral-700);
      --filter-pill-text-hover: var(--color-neutral-900);
      --filter-pill-text-active: var(--color-neutral-0);
    }
    .btn--neutral {
      background: var(--color-neutral-800);
      color: var(--color-neutral-0);
    }
    .btn--neutral:hover:not(:disabled) { filter: brightness(1.15); }
    .btn--neutral:active:not(:disabled) { filter: brightness(0.9); }

    /* Tab bar */
    .page-tabs {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface);
      flex-shrink: 0;
      overflow-x: auto;
    }
    .page-tabs .tabs {
      justify-content: flex-start;
      flex: 1;
      padding-top: var(--spacing-l);
    }
    .page-tabs__right {
      display: flex;
      align-items: center;
      padding-right: var(--spacing-l);
      flex-shrink: 0;
      font-size: var(--font-size-12);
      color: var(--color-text-muted);
    }

    /* Content area */
    .page-content {
      flex: 1;
      overflow-y: auto;
      padding: var(--spacing-l);
      background: var(--color-background);
    }
  </style>
</head>
<body>

  <div class="page-shell">

    <!-- MAIN COLUMN -->

      <!-- TAB BAR (remove if page has no tabs) -->
      <div class="page-tabs">

            <span class="tabs__icon-wrap">
              <span class="tabs__icon tabs__icon--badge"><img src="https://intelinair-misc.s3.amazonaws.com/common/icons/disease_badges/all.svg" alt="All" /></span>
              <span class="counter-badge counter-badge--warning" style="font-size:10px;min-width:18px;height:16px;padding:0 4px;">0</span>
            </span>
            <span class="tabs__label">All</span>
            <span class="tabs__indicator-wrap"><span class="tabs__indicator"></span></span>
          </button>
          <button class="tabs__item" role="tab" aria-selected="false">
            <span class="tabs__icon-wrap">
              <span class="tabs__icon tabs__icon--badge"><!-- tab icon here --></span>
              <span class="counter-badge counter-badge--info" style="font-size:10px;min-width:18px;height:16px;padding:0 4px;">0</span>
            </span>
            <span class="tabs__label">Tab 2</span>
            <span class="tabs__indicator-wrap"><span class="tabs__indicator"></span></span>
          </button>
          <button class="tabs__item" role="tab" aria-selected="false">
            <span class="tabs__icon-wrap">
              <span class="tabs__icon tabs__icon--badge"><!-- tab icon here --></span>
              <span class="counter-badge counter-badge--info" style="font-size:10px;min-width:18px;height:16px;padding:0 4px;">0</span>

      <!-- CONTENT AREA -->

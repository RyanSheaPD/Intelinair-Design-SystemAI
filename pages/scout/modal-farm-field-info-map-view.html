<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map field info popover — full field-info-card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../design-tokens/tokens.css" />
  <link rel="stylesheet" href="../../components/typography.css" />
  <link rel="stylesheet" href="../../components/modal.css" />
  <link rel="stylesheet" href="../../components/modal-farm-info.css" />
  <link rel="stylesheet" href="../../components/scouting-pill.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-family);
      background: var(--color-neutral-300);
    }
    .modal-overlay--map-field-card .modal {
      max-width: 440px;
    }
  </style>
</head>
<body>
  <!--
    Full map field-info (mde-popover + mat-card field-info-card): field-details stack (gap-6),
    app-pop-up-header-info (acreage, planting, crop, GDD), flight row (scout | Event GDD | flight code),
    equipment-details (Scouting details, base map, status, annotations). See modal-farm-info.css.
  -->
  <div
    class="modal-overlay modal-overlay--map-field-card modal-overlay--open"
    aria-hidden="false"
    aria-modal="true"
    role="dialog"
    aria-labelledby="map-field-info-title"
  >
    <div class="modal modal--harvest-detail">
      <div class="modal-harvest__header modal-harvest__header--field-info-full">
        <div class="field-info-popover">
          <article class="field-info-card" aria-labelledby="map-field-info-title">
            <div class="field-info-card__content">
              <div class="field-details">
                <div class="field-details__stack modal-farm-info modal-farm-info--map-view">

                    <button type="button" class="modal-harvest__icon-btn modal-harvest__icon-btn--star" aria-label="Favorite field" title="Favorite field">
                      <span class="material-symbols-outlined" aria-hidden="true">star</span>
                    </button>
                    <div class="modal-farm-info__title-copy-wrap">
                      <button type="button" class="modal-harvest__icon-btn modal-farm-info__copy-btn modal-farm-info__copy-btn--dim js-copy-field-name" data-copy="Coe South" aria-label="Copy field name" title="Click to copy">
                        <span class="modal-farm-info__copy-icon" aria-hidden="true">
                          <svg viewBox="0 0 13 16" fill="none" xmlns="http://www.w3.org/2000/svg" focusable="false">

                          </svg>

                      </button>
                    </div>
                  </div>
                  <div class="modal-farm-info__context-row modal-farm-info__context-row--map-popover">
                    <div class="modal-farm-info__location modal-farm-info__location--faint">Coe Farm - South of CIE</div>
                    <div class="modal-farm-info__grower-group">

                      </button>
                    </div>
                  </div>
                  <div class="modal-farm-info__notes modal-farm-info__notes--f12" aria-label="Field notes">
                    <div class="modal-farm-info__notes-inner annotation-notes"></div>
                  </div>

                        </svg>
                      </span>
                      <span>N/A</span>
                    </span>

                      <div class="modal-farm-info__crop modal-farm-info__crop--inline">
                        <span class="modal-farm-info__crop-icon modal-farm-info__crop-icon--corn" aria-hidden="true">

                  </div>

                      </app-combined-status-pill>
                    </div>

                          <div class="scouting-pill f-14">
                            <div class="title virtualScouting ng-star-inserted">
                              <div class="d-flex align-items-center">

                              </div>
                            </div>
                          </div>
                        </app-scouting-pill>
                        <app-scouting-pill>
                          <div class="scouting-pill f-14 scouting-pill--skyscout">
                            <div class="title ng-star-inserted">

                            </div>

  <script>
    function wireCopy(selector) {
      document.querySelectorAll(selector).forEach(function (btn) {
        btn.addEventListener('click', function (e) {
          e.stopPropagation();
          var text = btn.getAttribute('data-copy');
          if (!text || !navigator.clipboard) return;
          navigator.clipboard.writeText(text);
        });
      });
    }
    wireCopy('.js-copy-field-name');
    wireCopy('.js-copy-flight-code');
  </script>

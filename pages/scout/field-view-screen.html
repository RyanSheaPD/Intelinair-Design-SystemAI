<script>
(function () {
  var toggle = document.getElementById("layersToggle");
  var panel = document.getElementById("layersPanel");
  var closeBtn = document.getElementById("layersClose");
  var stage = document.getElementById("fieldViewMapStage");

  if (toggle && panel) {
    function openPanel() {
      panel.hidden = false;
      toggle.setAttribute("aria-expanded", "true");
      toggle.classList.add("field-view__fab--active");
    }
    function closePanel() {
      panel.hidden = true;
      toggle.setAttribute("aria-expanded", "false");
      toggle.classList.remove("field-view__fab--active");
    }

    toggle.addEventListener("click", function () {
      if (panel.hidden) openPanel();
      else closePanel();
    });
    if (closeBtn) closeBtn.addEventListener("click", closePanel);

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape" && !panel.hidden) closePanel();
    });

    if (stage) {
      stage.addEventListener("click", function (e) {
        if (!panel.hidden && !panel.contains(e.target) && !toggle.contains(e.target)) closePanel();
      });
    }
  }

  var flightList = document.getElementById("flightChickletsList");
  if (flightList) {
    flightList.addEventListener("click", function (e) {
      var el = e.target.closest(".flight-element");
      if (!el || !flightList.contains(el)) return;
      flightList.querySelectorAll(".flight-element.selected").forEach(function (x) {
        x.classList.remove("selected");
      });
      el.classList.add("selected");
    });
  }
})();
</script>

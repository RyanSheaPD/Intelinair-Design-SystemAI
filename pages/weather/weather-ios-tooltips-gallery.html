<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgMRI — iOS-style GW &amp; Spray tooltips</title>
  <!-- Figma MCP html-to-design: open with #figmacapture=… from generate_figma_design (serve repo root over HTTP). -->
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="stylesheet" href="../../design-tokens/tokens.css" />
  <link rel="stylesheet" href="../css/weather-tooltips-ios.css" />
  <style>
    html {
      font-family: "SF Pro Text", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    body.weather-ios-tooltips-gallery {
      margin: 0;
      padding: 28px 20px 48px;
      background: #e8e8ed;
      color: #1c1c1e;
      font-size: 15px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    .ios-tooltip-gallery__doc {
      max-width: 920px;
      margin: 0 auto;
    }

    .ios-tooltip-gallery__title {
      margin: 0 0 8px;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .ios-tooltip-gallery__lede {
      margin: 0 0 28px;
      font-size: 14px;
      color: #636366;
      max-width: 40rem;
    }

    .ios-tooltip-gallery__lede code {
      font-size: 12px;
    }

    .ios-tooltip-gallery__section {
      margin-bottom: 40px;
    }

    .ios-tooltip-gallery__section h2 {
      margin: 0 0 6px;
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #636366;
    }

    .ios-tooltip-gallery__section p {
      margin: 0 0 16px;
      font-size: 13px;
      color: #636366;
      max-width: 48rem;
    }

    .ios-tooltip-gallery__grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px 24px;
      align-items: start;
    }

    .ios-tooltip-gallery__sample {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ios-tooltip-gallery__caption {
      margin: 0;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #8e8e93;
    }

    /* Static preview: same shell as floating list tooltip */
    body.weather-ios-tooltips-gallery .weather-tooltip.weather-tooltip--rich.weather-tooltip--ios {
      position: static;
      z-index: auto;
      pointer-events: auto;
    }
  </style>
</head>
<body class="weather-ios-tooltips-gallery">
  <div class="ios-tooltip-gallery__doc">
    <h1 class="ios-tooltip-gallery__title">iOS-style tooltips</h1>
    <p class="ios-tooltip-gallery__lede">
      Static samples of <code>buildWorkabilityDetailHTML</code> and <code>buildSprayDetailHTML</code> with
      <code>weather-tooltips-ios.css</code>. Same markup as the list tooltip in
      <code>agmri-weather.html</code> (serve this file over HTTP if you load the dataset from JSON elsewhere).
    </p>
    <div id="ios-tooltip-gallery-root" aria-busy="true">
      <p style="margin:0;font-size:14px;color:#636366;">Loading…</p>
    </div>
  </div>

  <script type="application/json" id="ios-tooltip-gallery-fields">
  {
    "fields": [
      {
        "field_id": "fld-demo-06",
        "field_name": "Demo field 6",
        "farm": "East Farm",
        "grower": "Gamma LLC",
        "air_temp_f": 55,
        "precip_24h_in": 0,
        "precip_48h_in": 0,
        "humidity_pct": 38,
        "soil_temp_f": 54,
        "soil_moisture_index": 0.31,
        "wind_speed_12hr_mph": 7,
        "wind_label": "SW 7 mph",
        "daily_high_temp_f": 78,
        "daily_low_temp_f": 48,
        "ground_workability_last_updated": "2026-04-07T17:00:00.000Z",
        "spray_outlook_last_updated": "2026-04-07T17:00:00.000Z"
      },
      {
        "field_id": "fld-demo-08",
        "field_name": "0927-Allan 275",
        "farm": "South Farm",
        "grower": "Beta Farms",
        "air_temp_f": 58,
        "precip_24h_in": 0,
        "precip_48h_in": 0,
        "humidity_pct": 82,
        "soil_temp_f": 50,
        "soil_moisture_index": 0.326,
        "wind_speed_12hr_mph": 11,
        "wind_label": "NW 11 mph",
        "daily_high_temp_f": 70,
        "daily_low_temp_f": 44,
        "ground_workability_last_updated": "2026-04-07T17:00:00.000Z",
        "spray_outlook_last_updated": "2026-04-07T17:00:00.000Z"
      },
      {
        "field_id": "fld-ios-spray-marginal",
        "field_name": "North 40",
        "farm": "West Farm",
        "grower": "Alpha Co-op",
        "air_temp_f": 60,
        "precip_24h_in": 0.15,
        "precip_48h_in": 0,
        "humidity_pct": 52,
        "soil_temp_f": 52,
        "soil_moisture_index": 0.324,
        "wind_speed_12hr_mph": 12,
        "wind_label": "W 12 mph",
        "daily_high_temp_f": 78,
        "daily_low_temp_f": 50,
        "ground_workability_last_updated": "2026-04-07T17:00:00.000Z",
        "spray_outlook_last_updated": "2026-04-07T17:00:00.000Z"
      }
    ]
  }
  </script>

  <script src="../js/weather-ground-spray-logic.js"></script>
  <script>
    (function () {
      'use strict';

      var L = window.WeatherGroundSprayLogic;
      var root = document.getElementById('ios-tooltip-gallery-root');

      function esc(s) {
        if (s == null) return '';
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function readFields() {
        var el = document.getElementById('ios-tooltip-gallery-fields');
        if (!el) return [];
        try {
          var o = JSON.parse(el.textContent.trim());
          return o && o.fields ? o.fields : [];
        } catch (e) {
          return [];
        }
      }

      function tooltipShell(inner, aria) {
        return (
          '<div class="weather-tooltip weather-tooltip--rich weather-tooltip--ios" role="region" aria-label="' +
          esc(aria) +
          '">' +
          inner +
          '</div>'
        );
      }

      function headerHTML(f) {
        return (
          '<div class="weather-map-tooltip__header">' +
          '<strong>' +
          esc(f.field_name) +
          '</strong>' +
          '<div class="weather-map-tooltip__meta">' +
          esc(f.farm) +
          ' · ' +
          esc(f.grower) +
          '</div></div>'
        );
      }

      function sample(caption, inner, aria) {
        return (
          '<div class="ios-tooltip-gallery__sample">' +
          '<p class="ios-tooltip-gallery__caption">' +
          esc(caption) +
          '</p>' +
          tooltipShell(inner, aria) +
          '</div>'
        );
      }

      function section(title, desc, bodyHtml) {
        return (
          '<section class="ios-tooltip-gallery__section">' +
          '<h2>' +
          esc(title) +
          '</h2>' +
          (desc ? '<p>' + desc + '</p>' : '') +
          '<div class="ios-tooltip-gallery__grid">' +
          bodyHtml +
          '</div></section>'
        );
      }

      function fieldById(fields, id) {
        for (var i = 0; i < fields.length; i++) {
          if (fields[i].field_id === id) return fields[i];
        }
        return null;
      }

      function build() {
        if (!L || !root) return;
        var fields = readFields();
        var html = '';

        html += section(
          'Ground workability — list hover',
          'Field name eyebrow + card (same as a clicked list cell on desktop).',
          fields
            .map(function (f) {
              return sample(
                f.field_name + ' — GW',
                L.buildWorkabilityDetailHTML(
                  L.classifyGroundWorkability(f.soil_moisture_index),
                  f.ground_workability_last_updated,
                  f.field_name
                ),
                'Ground workability: ' + L.classifyGroundWorkability(f.soil_moisture_index).status
              );
            })
            .join('')
        );

        html += section(
          'Ground workability — no eyebrow',
          'Bottom sheet / map block: card only, no label above.',
          sample(
            '0927-Allan 275 — GW (sheet style)',
            L.buildWorkabilityDetailHTML(
              L.classifyGroundWorkability(fieldById(fields, 'fld-demo-08').soil_moisture_index),
              fieldById(fields, 'fld-demo-08').ground_workability_last_updated
            ),
            'Ground workability'
          )
        );

        html += section(
          'Spray outlook',
          'OK strip, metric rows, and pills (AT RISK / MARGINAL).',
          fields
            .map(function (f) {
              return sample(
                f.field_name + ' — Spray',
                L.buildSprayDetailHTML(L.analyzeSprayOutlook(f), f.spray_outlook_last_updated),
                'Spray outlook: ' + L.analyzeSprayOutlook(f).consolidated.status
              );
            })
            .join('')
        );

        var f8 = fieldById(fields, 'fld-demo-08');
        if (f8) {
          html += section(
            'Map-style combined',
            'Field header plus GW and Spray cards (map hover, full tooltip).',
            sample(
              '0927-Allan 275 — combined',
              headerHTML(f8) +
                L.buildWorkabilityDetailHTML(
                  L.classifyGroundWorkability(f8.soil_moisture_index),
                  f8.ground_workability_last_updated
                ) +
                L.buildSprayDetailHTML(L.analyzeSprayOutlook(f8), f8.spray_outlook_last_updated),
              'Field weather summary'
            )
          );
        }

        root.removeAttribute('aria-busy');
        root.innerHTML = html;
      }

      build();
    })();
  </script>
</body>
</html>
